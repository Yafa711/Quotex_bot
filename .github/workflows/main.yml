name: Run Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: إعداد الوظيفة
        uses: actions/checkout@v3

      - name: إعداد بايثون 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: تثبيت التبعيات
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto motor colorama dnspython flask gunicorn requests
          pip install pymongo python-dotenv
          git clone https://github.com/cleitonleonel/pyquotex.git /tmp/pyquotex
          cd /tmp/pyquotex && pip install -e . && cd -
          python -c "from pyquotex.client import Quotex; print('pyquotex OK')"

      - name: إنشاء ملف .env
        run: |
          cat > .env << EOF
          API_ID=${{ secrets.API_ID }}
          API_HASH=${{ secrets.API_HASH }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          OWNER_ID=${{ secrets.OWNER_ID }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          PING_INTERVAL=20
          EOF

      - name: تشغيل البوت
        run: |
          python3 bot.py
